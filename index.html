<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Etch-a-Sketch</title>
  </head>
  <body>
    <div class="header">
      <h1>Etch-a-Sketch</h1>
    </div>
    <div class="buttons">
      <button class="clear-btn">Clear Grid</button>
      <button class="draw-btn">Draw</button>
      <button class="eraser-btn">Eraser</button>
    </div>
    <div class="grid-container"></div>
    <h3>Canvas Size</h3>
    <div class="slide-container">
      <input type="range" min="4" max="64" value="16" class="size-slider" />
    </div>
    <p class="slider-value"></p>
    <script src="app.js"></script>
  </body>
</html>
